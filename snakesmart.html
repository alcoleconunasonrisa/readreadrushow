<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Smart - Ortografía</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2b6cb0;
            --tablero: #fefae0;
            --snake-body: #27ae60;
            --snake-head: #2ecc71;
            --accent: #f6ad55;
            --correct: #48bb78;
        }

        * { touch-action: none; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            margin: 0; padding: 10px;
            font-family: 'Fredoka', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: white; overflow-x: hidden;
        }

        .btn-home {
            position: absolute; top: 10px; left: 10px;
            background: white; border: none; border-radius: 50%;
            width: 45px; height: 45px; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
            text-decoration: none; z-index: 20;
        }

        #word-card {
            background: white; color: #2d3748;
            padding: 10px 20px; border-radius: 50px;
            margin-bottom: 15px; font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 600;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2); letter-spacing: 2px;
            z-index: 5; min-height: 60px; display: flex; align-items: center;
            text-align: center; justify-content: center; width: 90%; max-width: 500px;
            transition: transform 0.3s ease;
        }

        .flash-word { transform: scale(1.1); color: var(--correct) !important; }

        .main-layout {
            display: flex; gap: 15px; align-items: flex-start;
            flex-wrap: wrap; justify-content: center; width: 100%;
        }

        .side-panel {
            background: rgba(0,0,0,0.2); padding: 15px;
            border-radius: 20px; width: 120px; text-align: center;
        }

        #game-container {
            position: relative; background: #1a365d;
            padding: 10px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            width: 95vw; max-width: 500px; 
        }

        canvas {
            display: block; background-color: var(--tablero);
            width: 100%; height: auto; 
            border-radius: 12px; aspect-ratio: 1 / 1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; text-align: center; padding: 20px;
        }

        #temp-msg {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--correct); color: white;
            padding: 10px 20px; border-radius: 15px;
            font-size: 1.5rem; font-weight: 600;
            display: none; z-index: 8; pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            80% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .menu-section { margin-bottom: 15px; width: 100%; }
        .menu-label { font-size: 0.8rem; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }

        .selector-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }

        .option-btn {
            padding: 8px 4px; border: 2px solid var(--accent);
            background: transparent; color: white; border-radius: 8px;
            cursor: pointer; font-family: 'Fredoka'; font-size: 0.75rem; transition: 0.2s;
        }

        .option-btn.active { background: var(--accent); font-weight: 600; }

        .play-btn {
            padding: 15px 35px; background: var(--correct); color: white; border: none; 
            border-radius: 12px; font-weight: 600; cursor: pointer; font-family: 'Fredoka'; font-size: 1.2rem;
            box-shadow: 0 4px 0 #2f855a; margin-top: 10px;
        }

        #history-list { font-size: 0.85rem; list-style: none; padding: 0; text-align: left; margin: 0; }
        #history-list li.done { color: #f6ad55; font-weight: 600; margin-bottom: 4px; }
    </style>
</head>
<body>

    <a href="main-index.html" class="btn-home">🏠</a>

    <div id="word-card">¡ELIGE TU RETO!</div>

    <div class="main-layout">
        <div class="side-panel">
            <div style="font-size: 0.7rem; color: var(--accent)">PUNTOS</div>
            <div id="score-val" style="font-size: 1.8rem;">0</div>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="temp-msg">¡MUY BIEN!</div>
            
            <div id="menu-overlay" class="overlay">
                <h2 id="status-title" style="color:var(--accent); margin:0 0 15px 0; font-size: 1.5rem;">AJUSTES</h2>
                <div class="menu-section">
                    <div class="menu-label">Regla Ortográfica</div>
                    <div class="selector-grid">
                        <button class="option-btn active" onclick="setRule('mp_mb', this)">MP / MB</button>
                        <button class="option-btn" onclick="setRule('c_z', this)">C / Z</button>
                        <button class="option-btn" onclick="setRule('g_j', this)">G / J</button>
                        <button class="option-btn" onclick="setRule('b_v', this)">B / V</button>
                        <button class="option-btn" onclick="setRule('h', this)">CON H</button>
                        <button class="option-btn" onclick="setRule('mix', this)">MIXTO</button>
                    </div>
                </div>
                <div class="menu-section">
                    <div class="menu-label">Velocidad</div>
                    <div class="selector-grid">
                        <button class="option-btn active" onclick="setSpeed(200, this)">LENTO</button>
                        <button class="option-btn" onclick="setSpeed(130, this)">MEDIO</button>
                        <button class="option-btn" onclick="setSpeed(90, this)">RÁPIDO</button>
                    </div>
                </div>
                <button class="play-btn" onclick="iniciarJuego()">¡EMPEZAR! (Enter)</button>
            </div>
        </div>

        <div class="side-panel">
            <div style="font-size: 0.7rem; color: var(--accent)">LOGROS</div>
            <ul id="history-list"></ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const box = 20; 
        const gridCount = canvas.width / box;

        const diccionario = {
            mp_mb: ["TAMBOR", "CAMPO", "BOMBA", "LIMPIO", "SOMBRA", "CAMPANA", "ASOMBRO"],
            c_z: ["ZAPATO", "CIEGO", "ZORRO", "CENA", "AZUL", "CIELO", "CEBRA", "CAZAR"],
            g_j: ["GATO", "JIRAFA", "GENTE", "JABÓN", "GIGANTE", "JARRA", "GENIO", "RELOJ"],
            b_v: ["BARCO", "AVIÓN", "BOTAS", "VACA", "BALÓN", "VENTANA", "BOTELLA", "VERDE"],
            h: ["HUEVO", "HIELO", "HOJA", "HUESO", "HORMIGA", "HADA", "HUMO", "HIERBA"],
            mix: ["TAMBOR", "CIELO", "JIRAFA", "AVIÓN", "HUEVO", "CAMPO", "ZAPATO"]
        };

        let audioCtx = null;
        let currentVelocity = 200;
        let currentRule = 'mp_mb';
        let palabrasActuales = [];
        let serpiente, direccion, siguienteDir, comida, letrasComidas, score, loop;
        let juegoActivo = false, indicePalabra = 0;

        function setSpeed(ms, btn) {
            currentVelocity = ms;
            btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            playSound(400, 0.05);
        }

        function setRule(rule, btn) {
            currentRule = rule;
            btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            playSound(500, 0.05);
        }

        function playSound(freq, duration, type = 'sine') {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = type; o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // GESTOS
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => { 
            touchStartX = e.changedTouches[0].screenX; 
            touchStartY = e.changedTouches[0].screenY; 
        }, {passive: false});

        document.addEventListener('touchend', e => {
            if (!juegoActivo) return;
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 20) {
                    if (dx > 0 && direccion !== "LEFT") siguienteDir = "RIGHT";
                    else if (dx < 0 && direccion !== "RIGHT") siguienteDir = "LEFT";
                }
            } else {
                if (Math.abs(dy) > 20) {
                    if (dy > 0 && direccion !== "UP") siguienteDir = "DOWN";
                    else if (dy < 0 && direccion !== "DOWN") siguienteDir = "UP";
                }
            }
        }, {passive: false});

        // TECLADO (Flechas, WASD y Enter)
        window.addEventListener("keydown", e => {
            const keyMap = {
                "ArrowLeft":"LEFT", "a":"LEFT", "A":"LEFT",
                "ArrowUp":"UP", "w":"UP", "W":"UP",
                "ArrowRight":"RIGHT", "d":"RIGHT", "D":"RIGHT",
                "ArrowDown":"DOWN", "s":"DOWN", "S":"DOWN"
            };

            if(e.key === "Enter" && !juegoActivo) {
                iniciarJuego();
            }

            if(keyMap[e.key]) {
                const newDir = keyMap[e.key];
                const opposites = {"LEFT":"RIGHT","RIGHT":"LEFT","UP":"DOWN","DOWN":"UP"};
                if(newDir !== opposites[direccion]) siguienteDir = newDir;
                // Prevenir scroll con flechas
                if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
            }
        });

        function crearComida() {
            comida = {
                x: Math.floor(Math.random() * (gridCount - 2) + 1) * box,
                y: Math.floor(Math.random() * (gridCount - 2) + 1) * box,
                letra: palabrasActuales[indicePalabra][letrasComidas.length]
            };
        }

        function actualizarUI() {
            const meta = palabrasActuales[indicePalabra];
            let html = "";
            for(let i=0; i<meta.length; i++) {
                if(i < letrasComidas.length) html += `<span style="color:#38a169">${meta[i]}</span>`;
                else if(i === letrasComidas.length) html += `<span style="color:#e53e3e; border-bottom:3px solid;">${meta[i]}</span>`;
                else html += `<span style="color:#cbd5e0">${meta[i]}</span>`;
            }
            document.getElementById("word-card").innerHTML = html;
            document.getElementById("score-val").innerText = score;
        }

        function gameLoop() {
            if (!juegoActivo) return;
            direccion = siguienteDir;
            let hX = serpiente[0].x, hY = serpiente[0].y;

            if(direccion === "LEFT") hX -= box; 
            else if(direccion === "UP") hY -= box;
            else if(direccion === "RIGHT") hX += box; 
            else if(direccion === "DOWN") hY += box;

            if(hX === comida.x && hY === comida.y) {
                playSound(600, 0.1); 
                score += 10;
                letrasComidas += comida.letra;
                if(letrasComidas.length === palabrasActuales[indicePalabra].length) {
                    palabraCompletadaSinParar();
                } else {
                    crearComida(); 
                }
                actualizarUI();
            } else { 
                serpiente.pop(); 
            }

            if(hX < 0 || hY < 0 || hX >= canvas.width || hY >= canvas.height || serpiente.some(s => s.x === hX && s.y === hY)) {
                finalizarJuego(); return;
            }
            serpiente.unshift({x: hX, y: hY});
            dibujar();
        }

        function palabraCompletadaSinParar() {
            playSound(800, 0.2);
            score += 50;
            const palabraHecha = palabrasActuales[indicePalabra];
            const li = document.createElement("li"); 
            li.className = "done";
            li.innerText = "✓ " + palabraHecha;
            document.getElementById("history-list").prepend(li);

            const msg = document.getElementById("temp-msg");
            msg.innerText = "¡" + palabraHecha + "!";
            msg.style.display = "block";
            setTimeout(() => { msg.style.display = "none"; }, 1500);

            const card = document.getElementById("word-card");
            card.classList.add("flash-word");
            setTimeout(() => card.classList.remove("flash-word"), 1000);

            indicePalabra = (indicePalabra + 1) % palabrasActuales.length;
            letrasComidas = "";
            crearComida();
        }

        function dibujar() {
            ctx.fillStyle = "#fefae0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Comida
            ctx.fillStyle = "#e53e3e"; ctx.font = "bold 24px Fredoka";
            ctx.textAlign = "center"; ctx.fillText(comida.letra, comida.x + box/2, comida.y + 17);

            // Serpiente
            serpiente.forEach((s, i) => {
                const isHead = i === 0;
                
                // Estilo del cuerpo
                if(isHead) {
                    ctx.fillStyle = "#2ecc71";
                } else {
                    // Gradiente para el cuerpo
                    ctx.fillStyle = `rgb(39, ${174 - (i*2)}, 96)`;
                }
                
                ctx.beginPath();
                ctx.roundRect(s.x + 1, s.y + 1, box - 2, box - 2, 6);
                ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.1)";
                ctx.stroke();
                
                if(isHead) {
                    // OJOS NEGROS VISTOSOS
                    ctx.fillStyle = "black";
                    let e1, e2;
                    if(direccion === "RIGHT") { e1={x:15,y:6}; e2={x:15,y:14}; }
                    else if(direccion === "LEFT") { e1={x:5,y:6}; e2={x:5,y:14}; }
                    else if(direccion === "UP") { e1={x:6,y:5}; e2={x:14,y:5}; }
                    else { e1={x:6,y:15}; e2={x:14,y:15}; }
                    
                    // Dibujar ojos
                    ctx.beginPath(); ctx.arc(s.x + e1.x, s.y + e1.y, 3.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(s.x + e2.x, s.y + e2.y, 3.5, 0, Math.PI*2); ctx.fill();
                    
                    // Brillo blanco en los ojos
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(s.x + e1.x + 1, s.y + e1.y - 1, 1, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(s.x + e2.x + 1, s.y + e2.y - 1, 1, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        function iniciarJuego() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            palabrasActuales = [...diccionario[currentRule]].sort(() => Math.random() - 0.5);
            serpiente = [{x: 10*box, y: 10*box}, {x: 9*box, y: 10*box}, {x: 8*box, y: 10*box}];
            direccion = "RIGHT"; siguienteDir = "RIGHT";
            letrasComidas = ""; score = 0; indicePalabra = 0;
            document.getElementById("history-list").innerHTML = "";
            juegoActivo = true;
            document.getElementById("menu-overlay").style.display = "none";
            crearComida(); actualizarUI();
            if(loop) clearInterval(loop);
            loop = setInterval(gameLoop, currentVelocity);
        }

        function finalizarJuego() {
            juegoActivo = false; clearInterval(loop);
            playSound(150, 0.5, 'sawtooth');
            document.getElementById("status-title").innerText = "¡CHOQUE!";
            document.getElementById("menu-overlay").style.display = "flex";
        }

        ctx.fillStyle = "#fefae0"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
